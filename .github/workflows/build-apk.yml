# Build Android APK in CI — 无需在本地安装 Android SDK
name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate Gradle project
        id: gradle
        run: |
          if [ -f gradlew ]; then
            echo "has_gradle=true" >> $GITHUB_OUTPUT
            echo "project_dir=." >> $GITHUB_OUTPUT
          elif [ -f android-app/build.gradle.kts ] && [ -f android-app/gradlew ]; then
            echo "has_gradle=true" >> $GITHUB_OUTPUT
            echo "project_dir=android-app" >> $GITHUB_OUTPUT
          else
            echo "has_gradle=false" >> $GITHUB_OUTPUT
            echo "project_dir=." >> $GITHUB_OUTPUT
          fi

      - name: No Android project (skip build)
        if: steps.gradle.outputs.has_gradle != 'true'
        run: |
          echo "::notice title=No Android project::此仓库暂无 Gradle 工程。当前跳过构建并视为通过。"

      - name: Ensure Gradle wrapper (android-app)
        if: steps.gradle.outputs.has_gradle == 'true' && steps.gradle.outputs.project_dir == 'android-app'
        run: |
          if [ ! -f android-app/gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
            unzip -q gradle.zip
            cp gradle-8.4/gradle/wrapper/gradle-wrapper.jar android-app/gradle/wrapper/
            rm -rf gradle.zip gradle-8.4
          fi
          chmod +x android-app/gradlew

      - name: Set up JDK 17
        if: steps.gradle.outputs.has_gradle == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        if: steps.gradle.outputs.has_gradle == 'true'
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        if: steps.gradle.outputs.has_gradle == 'true'
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for Gradle wrapper (root)
        if: steps.gradle.outputs.has_gradle == 'true' && steps.gradle.outputs.project_dir == '.'
        run: chmod +x ./gradlew

      - name: Build Debug APK
        if: steps.gradle.outputs.has_gradle == 'true'
        run: |
          cd ${{ steps.gradle.outputs.project_dir }}
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: steps.gradle.outputs.has_gradle == 'true'
        continue-on-error: true
        run: |
          cd ${{ steps.gradle.outputs.project_dir }}
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_android.injected.signing.store.file: ${{ secrets.KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_android.injected.signing.store.password: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_android.injected.signing.key.alias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_android.injected.signing.key.password: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifacts
        if: steps.gradle.outputs.has_gradle == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apk-outputs
          path: |
            ${{ steps.gradle.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
            ${{ steps.gradle.outputs.project_dir }}/app/build/outputs/apk/release/*.apk
