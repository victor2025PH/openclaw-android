# Build Android APK in CI — 无需在本地安装 Android SDK
# 仓库需包含 Gradle 工程（含 gradlew 及 build.gradle）
name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for Gradle project
        id: gradle
        run: |
          if [ -f gradlew ]; then echo "has_gradle=true" >> $GITHUB_OUTPUT; else echo "has_gradle=false" >> $GITHUB_OUTPUT; fi

      - name: No Android project (skip build)
        if: steps.gradle.outputs.has_gradle != 'true'
        run: |
          echo "::notice title=No Android project::此仓库暂无 gradlew。添加 Android 应用模块后即可在此构建 APK，当前跳过构建并视为通过。"

      - name: Set up JDK 17
        if: steps.gradle.outputs.has_gradle == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        if: steps.gradle.outputs.has_gradle == 'true'
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        if: steps.gradle.outputs.has_gradle == 'true'
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for Gradle wrapper
        if: steps.gradle.outputs.has_gradle == 'true'
        run: chmod +x ./gradlew

      - name: Build Debug APK
        if: steps.gradle.outputs.has_gradle == 'true'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: steps.gradle.outputs.has_gradle == 'true'
        continue-on-error: true
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_android.injected.signing.store.file: ${{ secrets.KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_android.injected.signing.store.password: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_android.injected.signing.key.alias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_android.injected.signing.key.password: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifacts
        if: steps.gradle.outputs.has_gradle == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apk-outputs
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
